<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogos da Disciplina Gerenciamento e Comunicação</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            color: var(--text-main);
            font-size: 28px;
            margin-bottom: 10px;
        }

        p {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 35px;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        a {
            text-decoration: none;
            background-color: var(--primary);
            color: white;
            padding: 16px 24px;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 2px 4px rgba(79, 70, 229, 0.2);
        }

        a:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(79, 70, 229, 0.3);
        }

        a:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Gerenciamento e Comunicação</h1>
        <p>Escolha uma atividade abaixo para começar:</p>
        
        <div class="menu">
            <a href="https://missaovisaovalores.base44.app/" target="_blank">Missão, visão e valores</a>
            <a href="./swot.html">Análise Estratégica</a>
        </div>
    </div>

</body>
</html>
